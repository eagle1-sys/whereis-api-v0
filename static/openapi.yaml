openapi: 3.1.1
info:
  title: Eagle1 Whereis API v0
  description: Built for developers. Fully open-source. Track any shipment with one simple API.
  version: 0.3.0
servers:
  - url: https://api.eg1.io
    description: Production server
paths:
  /v0/whereis/{id}:
    get:
      summary: Retrieve tracking history for a shipment
      description: Returns both metadata and event timeline for a shipment
      parameters:
        - name: id
          in: path
          required: true
          description: Tracking ID in format {operator}-{trackingNumber}
          schema:
            type: string
            example: fdx-888877776666
        - name: phonenum
          in: query
          required: false
          description: Last 4 digits of recipient phone number (only required for the sfex operator)
          schema:
            type: string
            example: "6993"
        - name: refresh
          in: query
          required: false
          description: Force fresh data pull from carrier API, bypassing cache
          schema:
            type: boolean
            default: false
        - name: fulldata
          in: query
          required: false
          description: Include complete sourceData in event objects
          schema:
            type: boolean
            default: false
      x-codeSamples:
        - lang: bash
          label: Curl
          source: |-
            curl 'https://api.eg1.io/v0/whereis/fdx-888877776666' \
              --header 'Authorization: Bearer YOUR_SECRET_TOKEN'
      responses:
        "200":
          description: Successful response with tracking data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackingResponse"
              examples:
                fdx:
                  summary: FedEx shipment
                  value:
                    entity:
                      id: fdx-888877776666
                      type: waybill
                      uuid: 01931cdf-2b80-74e2-8924-d2e5a7b6c3f1
                      createdAt: 2024-11-11T14:16:48-06:00
                      additional:
                        origin: San Francisco CA United States
                        destination: CENTRAL  Hong Kong SAR, China
                        isCrossBorder: true
                        processingTimeMs: 3.7
                    events:
                      - status: 3000
                        what: Transport Bill Created
                        whom: FedEx
                        when: 2024-11-11T14:16:48-06:00
                        where: Customer location
                        notes: Shipment information sent to FedEx
                        additional:
                          trackingNum: "888877776666"
                          operatorCode: fdx
                          dataProvider: FedEx
                          updateMethod: manual-pull
                          updatedAt: 2025-02-20T12:23:43.892Z
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - BearerAuth: []
  /v0/status/{id}:
    get:
      summary: Retrieve latest status for a shipment
      description: Returns only the latest status without full event history
      parameters:
        - name: id
          in: path
          required: true
          description: Tracking ID in format {operator}-{trackingNumber}
          schema:
            type: string
            example: sfex-SF1234123412341
        - name: phonenum
          in: query
          required: false
          description: Last 4 digits of recipient phone number (required for sfex operator)
          schema:
            type: string
            example: "6993"
      responses:
        "200":
          description: Successful response with latest status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /v0/push/{operator}:
    post:
      summary: Push tracking data from external sources
      description:
        Allows authenticated clients to push tracking information directly
        into the system
      parameters:
        - name: operator
          in: path
          required: true
          description: The carrier/operator code
          schema:
            type: string
            enum:
              - eg1
            example: eg1
      requestBody:
        required: true
        description: Tracking data structure depends on the operator
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PushRequestBody"
            examples:
              eg1:
                summary: Eg1 push data
                value:
                  eg1DataVersion: 1
                  events:
                    - trackingNum: "123412341234"
                      status: 3000
                      what: "Transport Bill Created"
                      whom: "Eagle1"
                      when: "2024-11-11T14:16:48-06:00"
                      where: "Customer location"
                      notes: "Shipment information sent to FedEx"
                    - trackingNum: "567856785678"
                      status: 3100
                      what: "Received by Carrier"
                      whom: "Eagle1"
                      when: "2024-11-12T08:30:00-06:00"
                      where: "San Francisco, CA"
                      notes: "Package picked up"
      responses:
        "200":
          description: Successfully processed push data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PushResponse"
              example:
                eventsReceived: 2
                eventsAdded: 1
                eventsDuplicate: 1
                createdTrackingIds: ['eg1-123412341234']
                updatedTrackingIds: []
                unchangedTrackingIds: ['eg1-567856785678']
                failedTrackingIds: []
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - BearerAuth: []
  /v0/operators:
    get:
      summary: Retrieve list of active operators
      description: Returns all available logistics providers
      responses:
        "200":
          description: Successful response with operators list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperatorsResponse"
              example:
                operators:
                  - code: fdx
                    name: FedEx
                    active: true
                  - code: sfex
                    name: SF Express
                    active: true
        "500":
          $ref: "#/components/responses/InternalServerError"
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: Bearer token authentication required for most endpoints
  schemas:
    TrackingResponse:
      type: object
      properties:
        entity:
          $ref: "#/components/schemas/Entity"
        events:
          type: array
          items:
            $ref: "#/components/schemas/TrackingEvent"
    StatusResponse:
      type: object
      description: Latest status information for a shipment
      properties:
        id:
          type: string
          description: Tracking ID
          example: "sfex-SF1234123412341"
        status:
          type: integer
          description: Standardized status code
          example: 3500
        what:
          type: string
          description: Human-readable status description
          example: "Delivered"
        when:
          type: string
          format: date-time
          description: Timestamp of status
          example: "2024-11-11T14:16:48-06:00"
        where:
          type: string
          description: Location description
          example: "SUGINAMI-KU, TOKYO"
        notes:
          type: string
          description: Description of event
          example: ""
    PushRequestBody:
      type: object
      required:
        - eg1DataVersion
        - events
      properties:
        eg1DataVersion:
          type: integer
          description: Version of the Eagle1 data format
          example: 1
        events:
          type: array
          description: Array of tracking events to push
          items:
            $ref: "#/components/schemas/PushEvent"
    PushEvent:
      type: object
      required:
        - trackingNum
        - status
        - what
        - whom
        - when
        - where
      properties:
        trackingNum:
          type: string
          description: Carrier's tracking number (without operator prefix)
          example: "888877776666"
        status:
          type: integer
          description: Standardized status code (3000-3500 range)
          example: 3000
        what:
          type: string
          description: Human-readable event description
          example: "Transport Bill Created"
        whom:
          type: string
          description: Party responsible for event
          example: "Eg1"
        when:
          type: string
          format: date-time
          description: Timestamp of event occurrence
          example: "2024-11-11T14:16:48-06:00"
        where:
          type: string
          description: Location description
          example: "Customer location"
        notes:
          type: string
          description: Additional context or details
          example: "Shipment information sent to Eg1"
    PushResponse:
      type: object
      properties:
        eventsReceived:
          type: integer
          description: Total events submitted
        eventsAdded:
          type: integer
          description: Total events were actually persisted
        eventsDuplicate:
          type: integer
          description: Total events exist in the system
        createdTrackingIds:
          type: array
          items:
            type: string
            description: Tracking IDs of new entities created
        updatedTrackingIds:
          type: array
          items:
            type: string
            description: Tracking IDs with new event appended
        unchangedTrackingIds:
          type: array
          items:
            type: string
            description: Tracking IDs that fully up-to-date
        failedTrackingIds:
          type: array
          items:
            type: string
            description: Tracking IDs that failed to be processed
    OperatorsResponse:
      type: object
      properties:
        operators:
          type: array
          items:
            $ref: "#/components/schemas/Operator"
    Entity:
      type: object
      properties:
        id:
          type: string
          description: Tracking ID in slug format
          example: sfex-SF1234123412341
        type:
          type: string
          example: waybill
        uuid:
          type: string
          description: Unique identifier in UUIDv7
          example: 019c1e4d-d030-457b-be21-5df1f519fbc4
        createdAt:
          type: string
          format: date-time
        additional:
          type: object
          properties:
            origin:
              type: string
            destination:
              type: string
            isCrossBorder:
              type: boolean
            processingTimeMs:
              type: number
              description: Server-side processing time in milliseconds
    TrackingEvent:
      type: object
      properties:
        status:
          type: integer
          description: Standardized status code (3000-3500 range)
        what:
          type: string
          description: Human-readable event description
        whom:
          type: string
          description: Party responsible for event
        when:
          type: string
          format: date-time
          description: Timestamp of event occurrence
        where:
          type: string
          description: Location description
        notes:
          type: string
          description: Additional context or details
        additional:
          type: object
          properties:
            trackingNum:
              type: string
            operatorCode:
              type: string
            dataProvider:
              type: string
            updateMethod:
              type: string
            updatedAt:
              type: string
              format: date-time
            sourceData:
              type: object
              description: Raw carrier API response data (included when fulldata=true)
    Operator:
      type: object
      properties:
        code:
          type: string
          description: Operator code used in tracking IDs
          example: fdx
        name:
          type: string
          description: Full operator name
          example: FedEx
        active:
          type: boolean
          description: Whether the operator is currently active
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Error code in format "HTTPSTATUS-CODE"
          example: 400-01
        message:
          type: string
          description: Human-readable error message
          example: Tracking ID is required
  responses:
    BadRequest:
      description: Bad request - invalid parameters or request format
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            missing_tracking_id:
              value:
                error: 400-01
                message: Tracking ID is required
            invalid_tracking_number:
              value:
                error: 400-02
                message: Invalid tracking number format
            missing_parameter:
              value:
                error: 400-03
                message: Missing required parameter
    Unauthorized:
      description: Authentication failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            missing_header:
              value:
                error: 401-01
                message: Missing or malformed Authorization header
            invalid_token:
              value:
                error: 401-02
                message: Invalid authentication token
    Forbidden:
      description: Client not authorized for this operation
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: 403-01
            message: Client not authorized for this operator
    NotFound:
      description: No data available from carrier
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: 404-01
            message: No data available from carrier
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: "500"
            message: Internal Server Error
